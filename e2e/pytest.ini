[pytest]
# Step-definition modules are named *_steps.py rather than test_*.py.
python_files = test_*.py *_steps.py
python_functions = test_*

bdd_features_base_dir = features/

markers =
    smoke: fast, high-value checks — run first to validate the harness
    regression: locks in a previously-shipped bug fix
    auth: login/signup/OTP flows
    payment: checkout/PayUni/result flows
    route_guard: ProtectedRoute / RequirePaymentRoute redirect rules
    listing: 刊登管理 (service-provider listing) CRUD flows
    rewards: points balance / reward history / withdrawal flows
    negative: invalid-input / not-found / no-match paths that must fail gracefully
    compatibility: responsive / cross-viewport rendering checks

# Keep console output readable when a scenario fails.
addopts = -ra --strict-markers

# journey/ is a separate suite with its own rootdir (own pytest.ini): it talks
# to a real disposable Supabase branch and must never run inside the default
# fully-mocked suite. Run it explicitly with `cd journey && pytest`.
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv .venv node_modules journey
