[pytest]
# Own rootdir on purpose: with rootdir = e2e/journey, pytest's confcutdir
# stops here and the parent mocked suite's conftest (network-blocking guard,
# port-3000 dev server) never loads. Run with `cd e2e/journey && pytest`.
python_files = test_*.py *_steps.py
python_functions = test_*

bdd_features_base_dir = features/

markers =
    journey: full-stack scenarios against a real disposable Supabase branch
    skeleton: the single-user walking-skeleton path (M1)

addopts = -ra --strict-markers
