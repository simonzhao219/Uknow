[pytest]
# Own rootdir on purpose: with rootdir = e2e/journey, pytest's confcutdir
# stops here and the parent mocked suite's conftest (network-blocking guard,
# port-3000 dev server) never loads. Run with `cd e2e/journey && pytest`.
python_files = test_*.py *_steps.py
python_functions = test_*

bdd_features_base_dir = features/

markers =
    journey: full-stack scenarios against a real disposable Supabase branch
    skeleton: the single-user walking-skeleton path (M1)
    orgbuild: the 30-person six-generation tree build (M2)
    rewards: referral-tree and reward-ledger assertions over the built tree (M2)
    tasks: mission-system scenarios — referral-king achievement and claim (M3)
    listing: listing CRUD and public visibility over the built tree (M3)
    withdrawal: dual-perspective withdrawal lifecycle incl. admin review (M3)
    negative: invalid-input / boundary paths that must fail gracefully

addopts = -ra --strict-markers
