<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>驗證您的 Email — Uknow</title>
</head>
<body style="margin:0;padding:0;background-color:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
    style="background-color:#f2f2f2;padding:48px 20px;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
          style="max-width:520px;background-color:#ffffff;border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,0.08);box-shadow:0 2px 12px rgba(0,0,0,0.06);">

          <!-- Header -->
          <tr>
            <td style="background-color:#030213;padding:24px 40px;text-align:center;">
              <span style="color:#ffffff;font-size:18px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;">
                UKNOW
              </span>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:44px 40px 36px;text-align:center;">

              <p style="margin:0 0 6px;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#b0b0b8;">
                帳號驗證
              </p>
              <h1 style="margin:0 0 16px;font-size:24px;font-weight:600;color:#030213;letter-spacing:-0.02em;line-height:1.3;">
                歡迎加入 Uknow
              </h1>
              <p style="margin:0 0 36px;font-size:15px;color:#717182;line-height:1.7;">
                請使用以下驗證碼完成帳號註冊。
              </p>

              <!-- OTP Box -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                style="margin-bottom:36px;">
                <tr>
                  <td style="background-color:#f7f7f8;border-radius:8px;border:1px solid rgba(0,0,0,0.09);padding:28px 24px;text-align:center;">
                    <span style="display:block;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#b0b0b8;margin-bottom:12px;">
                      驗證碼
                    </span>
                    <span style="font-size:40px;font-weight:700;letter-spacing:0.3em;color:#030213;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;">
                      {{ .Token }}
                    </span>
                    <span style="display:block;margin-top:14px;font-size:12px;color:#b0b0b8;">
                      有效期限 24 小時
                    </span>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:14px;color:#999;line-height:1.6;">
                請勿將此驗證碼分享給任何人。
              </p>

            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <div style="height:1px;background-color:rgba(0,0,0,0.07);"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px 36px;text-align:center;">
              <p style="margin:0 0 8px;font-size:12px;color:#c0c0c8;line-height:1.7;">
                如果您未曾申請 Uknow 帳號，請忽略此信件。此信件由系統自動發送，請勿直接回覆。
              </p>
              <p style="margin:0;font-size:12px;color:#717182;font-weight:500;">
                Uknow 團隊
              </p>
            </td>
          </tr>

        </table>
        <!-- /Card -->

        <!-- Below-card note -->
        <table role="presentation" cellpadding="0" cellspacing="0" style="margin-top:24px;">
          <tr>
            <td style="text-align:center;">
              <p style="margin:0;font-size:11px;color:#c0c0c8;">
                © 2025 Uknow. All rights reserved.
              </p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
