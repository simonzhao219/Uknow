name: Monthly History Cleanup

# 每月 1 號 02:00 (UTC+8 = 18:00 UTC 前一天) 自動執行
on:
  schedule:
    # 分 時 日 月 星期
    # 0 18 L * * 表示每月最後一天 18:00 UTC（即次月 1 號 02:00 UTC+8）
    # 由於 GitHub Actions 不支援 L，使用 1 號早上
    - cron: '0 18 1 * *'
  
  # 允許手動觸發
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger History Cleanup
        run: |
          echo "🔧 Triggering monthly history cleanup..."
          
          RESPONSE=$(curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP_STATUS:%{http_code}" \
            ${{ secrets.SUPABASE_PROJECT_URL }}/functions/v1/make-server-5c6718b9/tasks/admin/cleanup)
          
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          
          echo "Response status: $HTTP_STATUS"
          echo "Response body: $BODY"
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ History cleanup completed successfully"
          else
            echo "❌ History cleanup failed"
            exit 1
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Cleanup failed, please check logs"
