# ========================================
# Supabase CLI 配置文件（V2 - 兼容 CLI 2.67+）
# ========================================

[project]
# 專案 ID
id = "uhtwwxtazwqnlbejhprl"

# ========================================
# Edge Functions 全局配置
# ========================================
[functions]
# 禁用 JWT 驗證（我們在函數內部處理認證）
enabled = true

# 函數配置（新格式）
[functions.make-server-5c6718b9]
# 函數啟用
enabled = true
# 不驗證 JWT（命令行參數處理）
import_map = ""

# ========================================
# API 配置
# ========================================
[api]
# API 啟用
enabled = true
# API 端口
port = 54321
# Schema
schemas = ["public", "storage"]
# 額外搜索路徑
extra_search_path = ["public"]
# 最大行數
max_rows = 1000

# ========================================
# 資料庫配置
# ========================================
[db]
# 資料庫端口
port = 54322
# 主要版本
major_version = 15

# ========================================
# 本地開發配置（可選）
# ========================================
[studio]
# Studio 端口
port = 54323
# 啟用
enabled = true
