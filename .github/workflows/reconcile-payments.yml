name: Reconcile Pending Payments

# 對 PayUni webhook 沒送達、卡在 pending 太久的訂單做對帳。
#
# queryPayUniTradeStatus 已實作（PayUni server-to-server 交易查詢，
# 見 supabase/functions/api/index.ts）。排程尚未打開：欄位契約需先在
# sandbox 用 workflow_dispatch 手動觸發驗證一輪（建一筆訂單、不送
# notify、確認對帳能把它撿回 completed 且效期錨定授權日），確認無誤
# 後把下面的 schedule 註解取消即可。
on:
  # 驗證通過後打開：
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Call reconciliation endpoint
        run: |
          curl -fsS -X POST \
            "https://${{ vars.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/api/internal/reconcile-pending-payments" \
            -H "x-internal-secret: ${{ secrets.RECONCILE_SECRET }}"
