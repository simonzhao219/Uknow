name: CI

on:
  pull_request:
    branches: [main]
    # 純文件變更不燒 CI（journey 設計書的 PR 曾為一個 .md 跑整套）
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

# 同一 ref 的新 push 淘汰舊 run，不排隊燒 runner
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # 前端型別檢查（vite build 用 SWC 只轉譯不檢查型別）
      - run: npm run typecheck
      # 前端純函式單元測試（vitest，node 環境，無需瀏覽器）
      - run: npm test
      # 死碼防線：未被引用的檔案與未使用的依賴一律擋下（見 knip.json）。
      # 存活元件的未使用 named export 不在此閘門內（vendored shadcn 子元件屬設計系統表面）。
      - run: npx knip --include files,dependencies
      - run: npm run build

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Edge Function
        working-directory: supabase/functions
        run: deno task check

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Check for Deno test files
        id: has-tests
        run: |
          if compgen -G "supabase/functions/api/*.test.ts" > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Start local Supabase
        if: steps.has-tests.outputs.found == 'true'
        run: supabase start

      - name: Export local Supabase connection info
        if: steps.has-tests.outputs.found == 'true'
        run: |
          echo "SUPABASE_URL=$(supabase status -o env | grep '^API_URL=' | cut -d= -f2- | tr -d '"')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')" >> "$GITHUB_ENV"

      - name: Run Deno tests against local Supabase
        if: steps.has-tests.outputs.found == 'true'
        working-directory: supabase/functions
        run: deno task test

      - name: Stop local Supabase
        if: always() && steps.has-tests.outputs.found == 'true'
        run: supabase stop

  e2e-tests:
    # e2e/ is a Python (pytest-bdd + Playwright) suite that fully mocks
    # Supabase/PayUni over the network, so it needs no secrets and drives the
    # app via `npm run dev` (not the build/ artifact). 刻意「不」needs: build
    # ——它不共用 build 產物，串行只是把牆鐘時間從 max(各 job) 拉成兩段
    # 相加；build 紅的時候 e2e 白跑幾分鐘是可接受的代價。
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: e2e/requirements.txt

      - name: Install e2e dependencies
        run: pip install -r e2e/requirements.txt

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run e2e suite
        working-directory: e2e
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest --browser chromium \
            --screenshot only-on-failure \
            --video retain-on-failure \
            --tracing retain-on-failure \
            --output test-results \
            -v

      - name: Upload e2e test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 14
          if-no-files-found: ignore

  journey-offline:
    # journey 套件的離線防線：純函數單元測試（twid / orgchart /
    # payuni_crypto）＋情境收集健全性。不需要瀏覽器、不需要 secrets、
    # 不打任何網路——真正的 journey 執行在 journey-nightly.yml。
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: e2e/journey/requirements.txt

      - name: Install journey dependencies
        run: pip install -r e2e/journey/requirements.txt

      - name: Offline unit tests
        working-directory: e2e/journey
        run: pytest tools/ -q

      - name: Scenario collection sanity
        working-directory: e2e/journey
        run: pytest --collect-only -q
