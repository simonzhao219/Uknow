name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Edge Function
        working-directory: supabase/functions
        run: deno task check

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check for Deno test files
        id: has-tests
        run: |
          if compgen -G "supabase/functions/api/*.test.ts" > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Start local Supabase
        if: steps.has-tests.outputs.found == 'true'
        run: supabase start

      - name: Export local Supabase connection info
        if: steps.has-tests.outputs.found == 'true'
        run: |
          echo "SUPABASE_URL=$(supabase status -o env | grep '^API_URL=' | cut -d= -f2- | tr -d '"')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')" >> "$GITHUB_ENV"

      - name: Run Deno tests against local Supabase
        if: steps.has-tests.outputs.found == 'true'
        working-directory: supabase/functions
        run: deno task test

      - name: Stop local Supabase
        if: always() && steps.has-tests.outputs.found == 'true'
        run: supabase stop

  e2e-tests:
    # e2e/ is a Python (pytest-bdd + Playwright) suite that fully mocks
    # Supabase/PayUni over the network, so it needs no secrets and drives the
    # app via `npm run dev` (not the build/ artifact) — `needs: build` is
    # just a fail-fast signal, not a shared build artifact.
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: e2e-tests-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: e2e/requirements.txt

      - name: Install e2e dependencies
        run: pip install -r e2e/requirements.txt

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run e2e suite
        working-directory: e2e
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest --browser chromium \
            --screenshot only-on-failure \
            --video retain-on-failure \
            --tracing retain-on-failure \
            --output test-results \
            -v

      - name: Upload e2e test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 14
          if-no-files-found: ignore
